<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Someone Special ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Dancing+Script:wght@700&display=swap');

        :root { --pink: #ff2d75; --purple: #bc13fe; --bg: #050505; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        /* Curtain System */
        .curtain-wrapper { position: fixed; inset: 0; display: flex; z-index: 10000; pointer-events: none; }
        .curtain { 
            width: 50%; height: 100%; background: #4a0000; 
            transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: inset 0 0 100px #000;
        }
        .opened .left { transform: translateX(-100%); }
        .opened .right { transform: translateX(100%); }

        .main-container {
            position: relative; z-index: 10; width: 100%; height: 300vh;
            display: flex; flex-direction: column;
            transition: transform 1.1s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .screen {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 10%; box-sizing: border-box;
        }

        h1 { 
            font-family: 'Syncopate', sans-serif; font-size: 1.3rem; letter-spacing: 6px; 
            text-transform: uppercase; margin-bottom: 20px; line-height: 1.6;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; transform: translateY(20px); transition: 0.8s ease 0.5s;
        }
        .active h1 { opacity: 1; transform: translateY(0); }

        /* DOB Tag - May 14 Fixed */
        .dob-tag {
            font-family: 'Syncopate', sans-serif; color: var(--pink); font-size: 0.8rem;
            margin-bottom: 40px; letter-spacing: 4px; border: 1px solid var(--pink);
            padding: 8px 15px; border-radius: 5px; box-shadow: 0 0 15px rgba(255, 45, 117, 0.3);
            opacity: 0; transition: 0.8s ease 0.7s;
        }
        .active .dob-tag { opacity: 1; }

        .buzzer {
            width: 110px; height: 110px; border-radius: 50%; border: none;
            background: linear-gradient(145deg, var(--pink), #dd1c5f);
            color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 0.8rem;
            cursor: pointer; position: relative;
            box-shadow: 0 10px 20px rgba(255, 45, 117, 0.4);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            -webkit-tap-highlight-color: transparent;
        }

        .balloon {
            position: absolute; bottom: -150px; width: 65px; height: 80px;
            border-radius: 50%; z-index: 9999; animation: floatUp 3.5s forwards ease-in;
        }
        @keyframes floatUp { to { transform: translateY(-180vh) rotate(20deg); } }

        .wish-box {
            font-size: 1.1rem; line-height: 2; color: #eee; margin-bottom: 40px;
            font-family: 'Dancing Script', cursive; max-width: 300px;
            opacity: 0; transform: scale(0.9); transition: 1s ease 0.8s;
        }
        .active .wish-box { opacity: 1; transform: scale(1); }

        .vault-btn {
            padding: 18px 35px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.03); color: #fff; text-decoration: none; border-radius: 50px;
            font-weight: 800; backdrop-filter: blur(10px); letter-spacing: 3px; font-size: 0.7rem;
        }

        .emoji { -webkit-text-fill-color: initial !important; background: none !important; display: inline-block; }
    </style>
</head>
<body onload="init()">

    <div class="curtain-wrapper" id="cw">
        <div class="curtain left"></div>
        <div class="curtain right"></div>
    </div>

    <div class="main-container" id="mc">
        
        <div id="s1" class="screen active">
            <h1>Something<br>Something <span class="emoji">✨</span></h1>
            <button class="buzzer" onclick="go(2)">TAP</button>
        </div>

        <div id="s2" class="screen">
            <div class="dob-tag">14 . 05 . 2026</div>
            <h1 style="background: linear-gradient(to bottom, #fff, var(--pink)); -webkit-background-clip: text;">Happy Birthday<br>Yahyaaa <span class="emoji">🤙🏻</span></h1>
            <button class="buzzer" id="pb" onmouseover="move()" onclick="handle()">NEXT</button>
        </div>

        <div id="s3" class="screen">
            <h1>For You <span class="emoji">🫠</span></h1>
            <div class="wish-box">
                "May your life be as bright as your smile.<br>
                May you achieve everything you dream of.<br>
                Stay happy, stay blessed, and stay you."
            </div>
            <a href="https://drive.google.com/drive/folders/14j-IU3Dp4Wa9d8jiUGG5J4ZhxVfGyRoP" class="vault-btn" target="_blank">OPEN THE VAULT</a>
        </div>
    </div>

    <script>
        let pCount = 0;

        function init() {
            setTimeout(() => document.getElementById('cw').classList.add('opened'), 1200);
        }

        function move() {
            const b = document.getElementById('pb');
            if (pCount < 5) {
                b.innerHTML = 'CATCH! <span class="emoji">😹</span>';
                const x = Math.random() * (window.innerWidth - 150) - (window.innerWidth / 2 - 75);
                const y = Math.random() * (window.innerHeight - 150) - (window.innerHeight / 2 - 75);
                b.style.position = 'absolute';
                b.style.transform = `translate(${x}px, ${y}px)`;
                pCount++;
            } else {
                b.innerHTML = 'CHALO JANE DIYA <span class="emoji">😏</span>';
                b.style.position = 'relative';
                b.style.transform = 'translate(0, 0)';
                b.style.width = '180px';
            }
        }

        function handle() {
            if (pCount >= 5) go(3);
            else move();
        }

        function go(sn) {
            const mc = document.getElementById('mc');
            launchBalloons(sn === 2 ? '#ff2d75' : '#bc13fe');
            
            setTimeout(() => {
                mc.style.transform = `translateY(-${(sn - 1) * 100}vh)`;
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById('s' + sn).classList.add('active');
            }, 1000);
        }

        function launchBalloons(color) {
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    let b = document.createElement('div');
                    b.className = 'balloon';
                    b.style.left = (Math.random() * 100) + 'vw';
                    b.style.backgroundColor = color;
                    b.style.boxShadow = `0 0 20px ${color}66`;
                    document.body.appendChild(b);
                    setTimeout(() => b.remove(), 4000);
                }, i * 40);
            }
        }
    </script>
</body>
</html>
